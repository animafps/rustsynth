name: build
on:
  push:
  pull_request:

jobs:
  build-test-lint-linux:
    name: Linux - build, test and lint
    runs-on: ubuntu-latest
    env: 
      LD_LIBRARY_PATH: /usr/local/lib
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install VapourSynth
        uses: animafps/install-vapoursynth-action@master
        with:
          version: 72
          cache: true
      - name: Build
        run: |
          rustup update nightly && rustup default nightly && rustup component add clippy rustfmt
          cargo build
      - name: Test
        run: |
          cargo test --workspace --lib --bins --tests --benches 
      - name: Lint
        run: |
          cargo clippy
      - name: Check format
        run: |
          cargo fmt -- --check
  build-test-lint-macos:
    name: macOS - build, test and lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install VapourSynth
        run: |
          pip install vapoursynth
          vapoursynth config
          vapoursynth register-install
      - name: Set VAPOURSYNTH_LIB_DIR
        run: |
          path=$(python -c "import os, vapoursynth; print(os.path.dirname(vapoursynth.__file__))")
          echo "VAPOURSYNTH_LIB_DIR=$path" >> $GITHUB_ENV
      - name: Build
        run: |
          rustup update nightly && rustup default nightly && rustup component add clippy rustfmt
          cargo build
      - name: Test
        run: |
          cargo test --workspace --lib --bins --tests --benches 
      - name: Lint
        run: |
          cargo clippy
      - name: Check format
        run: |
          cargo fmt -- --check
  build-test-lint-windows:
    name: Windows - build, test and lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install VapourSynth
        run: |
          pip install vapoursynth
          vapoursynth config
          vapoursynth register-install

      - name: Generate import libs from the pip-installed DLLs
        shell: pwsh
        run: |
          $vsDir = python -c "import os, vapoursynth; print(os.path.dirname(vapoursynth.__file__))"
          echo "VAPOURSYNTH_LIB_DIR=$vsDir" >> $env:GITHUB_ENV

          foreach ($name in "vapoursynth", "vsscript") {
            $dll = Join-Path $vsDir "$name.dll"
            if (Test-Path $dll) {
              $def = Join-Path $vsDir "$name.def"
              $lib = Join-Path $vsDir "$name.lib"

              "EXPORTS" | Out-File $def -Encoding ascii
              dumpbin /exports $dll |
                Select-String '^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+(\S+)$' |
                ForEach-Object { $_.Matches.Groups[1].Value } |
                Out-File $def -Append -Encoding ascii

              lib "/def:$def" "/out:$lib" /machine:x64
            }
          }

      - name: Inspect VapourSynth package layout
        shell: pwsh
        run: |
          $vsDir = python -c "import os, vapoursynth; print(os.path.dirname(vapoursynth.__file__))"
          Get-ChildItem -Recurse $vsDir | Select-Object FullName
          
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rustfmt, clippy
      - name: Build
        run: |
          cargo build
      - name: Test
        run: |
          Copy-Item "${{ env.VAPOURSYNTH_LIB_DIR }}\*.dll" "target\debug\deps\" -Force
          cargo test --workspace --lib --bins --tests --benches
      - name: Lint
        run: |
          cargo clippy
      - name: Check format
        run: |
          cargo fmt -- --check
