name: build
on:
  push:
  pull_request:

jobs:
  build-test-lint-linux:
    name: Linux - build, test and lint
    runs-on: ubuntu-latest
    env: 
      LD_LIBRARY_PATH: /usr/local/lib
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install VapourSynth
        uses: animafps/install-vapoursynth-action@master
        with:
          version: 72
          cache: true
      - name: Build
        run: |
          rustup update nightly && rustup default nightly && rustup component add clippy rustfmt
          cargo build
      - name: Test
        run: |
          cargo test --workspace --lib --bins --tests --benches 
      - name: Lint
        run: |
          cargo clippy
      - name: Check format
        run: |
          cargo fmt -- --check
  build-test-lint-macos:
    name: macOS - build, test and lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install VapourSynth
        run: |
          pip install vapoursynth
          vapoursynth config
          vapoursynth register-install
      - name: Set VAPOURSYNTH_LIB_PATH
        run: |
          path=$(python -c "import os, vapoursynth; print(os.path.dirname(vapoursynth.__file__))")
          echo "VAPOURSYNTH_LIB_PATH=$path" >> $GITHUB_ENV
      - name: Build
        run: |
          rustup update nightly && rustup default nightly && rustup component add clippy rustfmt
          cargo build
      - name: Test
        run: |
          cargo test --workspace --lib --bins --tests --benches 
      - name: Lint
        run: |
          cargo clippy
      - name: Check format
        run: |
          cargo fmt -- --check
  build-test-lint-windows:
    name: Windows - build, test and lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install VapourSynth
        run: |
          pip install vapoursynth
          vapoursynth config
          vapoursynth register-install
      - name: Set VAPOURSYNTH_LIB_PATH
        run: |
          $path = python -c "import os, vapoursynth; print(os.path.dirname(vapoursynth.__file__))"
          echo "VAPOURSYNTH_LIB_PATH=$path" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rustfmt, clippy
      - name: Build
        run: |
          cargo build
      - name: Test
        run: |
          Copy-Item "${{ env.VAPOURSYNTH_LIB_PATH }}\*.dll" "target\debug\deps\" -Force
          cargo test --workspace --lib --bins --tests --benches
      - name: Lint
        run: |
          cargo clippy
      - name: Check format
        run: |
          cargo fmt -- --check
